name: Build Android APK

# Builds the installable Android app (APK) in the cloud so no developer tools
# are needed locally. Runs on every push that touches the app, and can also be
# started by hand from the Actions tab. The finished APK is attached to the
# "app-latest" release for easy download onto each tablet.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install web dependencies
        working-directory: frontend
        run: npm ci

      - name: Build web assets
        working-directory: frontend
        run: npm run build

      - name: Sync Capacitor (Android)
        working-directory: frontend
        run: npx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp frontend/android/app/build/outputs/apk/debug/app-debug.apk bright-fabric-care.apk

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: bright-fabric-care-apk
          path: bright-fabric-care.apk
          if-no-files-found: error

      - name: Publish APK to the app-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-latest
          name: Bright Fabric Care — installable app
          files: bright-fabric-care.apk
          body: |
            The latest installable Android app for The Bright Fabric Care.

            **To install on a tablet:**
            1. Download **bright-fabric-care.apk** below.
            2. Open it; if Android warns, allow "install from unknown sources".
            3. Open the app once with internet so it loads and caches.
            4. In the app: Admin → Printer Setup → Find Printers → pick the printer.

            Built automatically from the latest code — install this file again
            whenever you want the newest version with native changes.
