# Optional one-click blueprint for Render.com.
# In Render: New + → Blueprint → pick this repo. It provisions the database
# and the web service together and wires DATABASE_URL automatically.
databases:
  - name: bright-fabric-care-db
    databaseName: bright_fabric_care
    plan: free

services:
  - type: web
    name: bright-fabric-care-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bright-fabric-care-db
          property: connectionString
